quarkus.http.root-path=/ebook
quarkus.http.port=8080

# PostgreSQL default datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ebook
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:root}

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# CORS — allow all origins in local dev
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-max-age=24H

# SMTP — Gmail configuration
quarkus.mailer.mock=false
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.from=${MAIL_FROM:isms24analytics@gmail.com}
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME:isms24analytics@gmail.com}
quarkus.mailer.password=${MAIL_PASSWORD:biny wqcw bvzw qqdv}

# App — frontend base URL for email links
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Production overrides
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.schema-management.strategy=none
%prod.quarkus.http.cors.origins=${CORS_ORIGINS:https://yourdomain.com}
