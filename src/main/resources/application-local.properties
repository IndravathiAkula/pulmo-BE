quarkus.http.root-path=/ebook
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0


# PostgreSQL default datasource
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ebook
#quarkus.datasource.username=${DB_USERNAME:postgres}
#quarkus.datasource.password=${DB_PASSWORD:root}
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.datasource.jdbc.max-lifetime=300
quarkus.datasource.jdbc.idle-removal-interval=60

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

# JWT  signing and verification
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=ebookhub-auth

# CORS
quarkus.http.cors=true
#quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.origins=*
quarkus.http.cors.methods=*
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-max-age=24H

# SMTP Gmail configuration
quarkus.mailer.mock=false
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.from=${MAIL_FROM:isms24analytics@gmail.com}
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME:isms24analytics@gmail.com}
quarkus.mailer.password=${MAIL_PASSWORD:biny wqcw bvzw qqdv}

# Seed secret
app.seed-secret=${SEED_SECRET:ebookhub-seed-secret-2026}

#  File storage (dev: local filesystem)
# storage.provider=local is the default; set storage.provider=s3 once an
# S3FileStorageService is added (not yet implemented).
storage.provider=${STORAGE_PROVIDER:local}
#storage.local.base-dir=${STORAGE_LOCAL_BASE_DIR:D:/ebook/ebook-be/public/uploads}
storage.local.base-dir=${STORAGE_LOCAL_BASE_DIR:/tmp/uploads}
storage.local.public-base-url=${STORAGE_LOCAL_PUBLIC_BASE_URL:/ebook/files}

#  HTTP body limits (multipart uploads)
# Sized for the largest per-kind limit (BOOK = 100MB); per-kind limits
# are enforced in LocalFileStorageService#store, this is just the HTTP ceiling.
quarkus.http.limits.max-body-size=150M
quarkus.http.body.handle-file-uploads=true
quarkus.http.body.uploads-directory=${QUARKUS_UPLOADS_DIR:target/uploads-tmp}


